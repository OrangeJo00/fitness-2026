<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI饮食追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">🍎 AI饮食追踪</h1>
        
        <!-- Tabs -->
        <div class="flex border-b mb-4">
            <button onclick="switchTab('home')" id="tab-home" class="px-4 py-2 font-semibold border-b-2 border-blue-500 text-blue-500">首页</button>
            <button onclick="switchTab('shopping')" id="tab-shopping" class="px-4 py-2 text-gray-600">购物</button>
            <button onclick="switchTab('recipe')" id="tab-recipe" class="px-4 py-2 text-gray-600">食谱库</button>
        </div>

        <!-- Home Tab -->
        <div id="content-home">
            <!-- Today's Meal Suggestion -->
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h2 class="text-lg font-bold mb-2">📅 今日建议</h2>
                <div id="todayPlan" class="text-gray-700 mb-3"></div>
                <div id="aiAdvice" class="bg-blue-50 p-3 rounded hidden">
                    <p class="text-sm font-semibold text-blue-800">💡 AI实时建议</p>
                    <p id="aiAdviceText" class="text-sm text-blue-700 mt-1"></p>
                </div>
            </div>

            <!-- Today Stats -->
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h2 class="text-lg font-bold mb-2">今日摄入</h2>
                <div class="space-y-2">
                    <div><span class="font-semibold">热量:</span> <span id="todayCalories">0</span> / <span id="targetCalories">1500</span> kcal</div>
                    <div><span class="font-semibold">蛋白质:</span> <span id="todayProtein">0</span> / 131g</div>
                    <div><span class="font-semibold">碳水:</span> <span id="todayCarbs">0</span> / 150g</div>
                    <div><span class="font-semibold">脂肪:</span> <span id="todayFat">0</span> / 42g</div>
                </div>
            </div>

            <!-- Food Log -->
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h2 class="text-lg font-bold mb-2">记录饮食</h2>
                <textarea id="foodInput" class="w-full border p-2 rounded" rows="3" placeholder="描述你吃了什么..."></textarea>
                <button onclick="logFood()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">记录</button>
                <div id="foodLog" class="mt-4"></div>
            </div>

            <!-- Weight Log -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-2">记录体重</h2>
                <input type="number" id="weightInput" class="border p-2 rounded" step="0.1" placeholder="kg">
                <button onclick="logWeight()" class="ml-2 bg-green-500 text-white px-4 py-2 rounded">记录</button>
            </div>
        </div>

        <!-- Shopping Tab -->
        <div id="content-shopping" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">🛒 智能采购</h2>
                <p class="text-gray-600 mb-4">三步流程：输入想吃的 → AI补充营养缺口 → 生成采购清单</p>
                
                <h3 class="font-semibold mb-2">Step 1: 本周想吃什么？</h3>
                <textarea id="userMeals" class="w-full border p-2 rounded mb-3" rows="5" placeholder="例如：&#10;周一中午：鸡胸肉沙拉&#10;周一晚餐：三文鱼糙米饭&#10;..."></textarea>
                
                <button onclick="analyzeAndPlan()" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">AI分析 + 生成清单</button>
                
                <div id="shoppingResult" class="hidden">
                    <div class="mb-4">
                        <h3 class="font-semibold mb-2">Step 2: AI营养补充建议</h3>
                        <div id="aiSuggestions" class="bg-yellow-50 p-3 rounded"></div>
                    </div>
                    
                    <div>
                        <h3 class="font-semibold mb-2">Step 3: 采购清单</h3>
                        <div id="shoppingList" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recipe Tab -->
        <div id="content-recipe" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-4">📚 食谱库</h2>
                <p class="text-gray-600">功能开发中...</p>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            sheetId: '1wcXUs1rLLWh4gXoB8y_5ZxP1CIJN1tzRdrgkiqRjQyk',
            appsScriptUrl: 'https://script.google.com/macros/s/AKfycbyVH8IDqDkNV0wLx-oiCY6lpDDeNJTKCvIXD_Ibge7LrL2NmA90Wip0nd1eDoeRiKBwbQ/exec',
            geminiApiKey: '', // loaded dynamically
            weeklyPlan: {} // format: {周一: {中午: 'xx', 晚餐: 'xx'}, ...}
        };

        let todayData = {calories: 0, protein: 0, carbs: 0, fat: 0};

        async function loadConfig() {
            try {
                const res = await fetch(CONFIG.appsScriptUrl + '?action=getConfig&user=Joyce');
                const data = await res.json();
                CONFIG.geminiApiKey = data.geminiApiKey || data.geminiKey;
                CONFIG.targetCalories = data.weekendCalories || 1700;
                document.getElementById('targetCalories').textContent = CONFIG.targetCalories;
            } catch (e) {
                console.error('Load config failed:', e);
            }
        }

        async function loadWeeklyPlan() {
            // Load from Google Sheets or localStorage
            const stored = localStorage.getItem('weeklyPlan');
            if (stored) {
                CONFIG.weeklyPlan = JSON.parse(stored);
                showTodayPlan();
            }
        }

        function showTodayPlan() {
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const today = days[new Date().getDay()];
            const plan = CONFIG.weeklyPlan[today];
            
            if (plan) {
                document.getElementById('todayPlan').innerHTML = `
                    <p><strong>${today}</strong></p>
                    <p>中午：${plan.中午 || '未设置'}</p>
                    <p>晚餐：${plan.晚餐 || '未设置'}</p>
                `;
            } else {
                document.getElementById('todayPlan').innerHTML = `<p class="text-gray-500">本周菜单未设置，去购物tab生成</p>`;
            }
        }

        async function logFood() {
            const input = document.getElementById('foodInput').value.trim();
            if (!input) return;
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '分析中...';

            // Call Gemini to analyze
            const nutrition = await analyzeFood(input);
            
            // Update today stats
            todayData.calories += nutrition.calories;
            todayData.protein += nutrition.protein;
            todayData.carbs += nutrition.carbs;
            todayData.fat += nutrition.fat;
            
            updateTodayStats();
            
            // Show AI advice
            showAIAdvice();
            
            // Save to Google Sheets
            await saveToSheets(input, nutrition);
            
            // Clear input
            document.getElementById('foodInput').value = '';
            
            // Add to log display
            const log = document.getElementById('foodLog');
            log.innerHTML = `<div class="mt-2 p-2 bg-gray-50 rounded">
                ${input}<br>
                <span class="text-sm text-gray-600">${nutrition.calories}kcal | 蛋白质${nutrition.protein}g | 碳水${nutrition.carbs}g | 脂肪${nutrition.fat}g</span>
            </div>` + log.innerHTML;
            
            btn.disabled = false;
            btn.textContent = '记录';
        }

        async function saveToSheets(description, nutrition) {
            try {
                const now = new Date();
                const timestamp = now.toISOString();
                
                await fetch(CONFIG.appsScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'addFood',
                        user: 'Joyce',
                        timestamp: timestamp,
                        description: description,
                        calories: nutrition.calories,
                        protein: nutrition.protein,
                        carbs: nutrition.carbs,
                        fat: nutrition.fat,
                        source: 'web'
                    })
                });
                
                console.log('Saved to Sheets:', description);
            } catch (e) {
                console.error('Save to Sheets failed:', e);
            }
        }

        async function analyzeFood(description) {
            if (!CONFIG.geminiApiKey) {
                console.error('Gemini API key not loaded');
                return {calories: 0, protein: 0, carbs: 0, fat: 0};
            }
            
            try {
                const prompt = `你是营养分析AI。请分析以下食物的营养成分。

注意：TJ = Trader Joe's
如果是Trader Joe's (TJ) 的产品，请参考官网数据：https://www.traderjoes.com/home
其他食物使用USDA或常见营养数据。

只返回JSON格式，不要其他文字：{"calories": 数字, "protein": 数字, "carbs": 数字, "fat": 数字}

食物描述：${description}`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${CONFIG.geminiApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: prompt}]}]
                    })
                });
                
                const data = await res.json();
                console.log('Gemini response:', data);
                
                if (!data.candidates || !data.candidates[0]) {
                    console.error('No candidates in response');
                    return {calories: 0, protein: 0, carbs: 0, fat: 0};
                }
                
                const text = data.candidates[0].content.parts[0].text;
                // Remove markdown code blocks if present
                const cleanText = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const jsonMatch = cleanText.match(/\{[^}]*"calories"[^}]*\}/);
                if (!jsonMatch) {
                    console.error('No JSON found in response:', text);
                    return {calories: 0, protein: 0, carbs: 0, fat: 0};
                }
                
                return JSON.parse(jsonMatch[0]);
            } catch (e) {
                console.error('Gemini API error:', e);
                return {calories: 0, protein: 0, carbs: 0, fat: 0};
            }
        }

        function updateTodayStats() {
            document.getElementById('todayCalories').textContent = todayData.calories;
            document.getElementById('todayProtein').textContent = todayData.protein;
            document.getElementById('todayCarbs').textContent = todayData.carbs;
            document.getElementById('todayFat').textContent = todayData.fat;
        }

        async function showAIAdvice() {
            const remaining = {
                protein: 131 - todayData.protein,
                carbs: 150 - todayData.carbs,
                fat: 42 - todayData.fat,
                calories: CONFIG.targetCalories - todayData.calories
            };
            
            let advice = [];
            if (remaining.protein > 30) advice.push(`还需蛋白质${remaining.protein}g`);
            if (remaining.carbs > 50) advice.push(`还需碳水${remaining.carbs}g`);
            if (todayData.fat > 42) advice.push(`脂肪已超标${todayData.fat - 42}g，建议减少`);
            
            if (advice.length > 0) {
                document.getElementById('aiAdviceText').textContent = advice.join('；');
                document.getElementById('aiAdvice').classList.remove('hidden');
            }
        }

        function logWeight() {
            const weight = document.getElementById('weightInput').value;
            if (!weight) return;
            alert('体重已记录: ' + weight + 'kg');
            document.getElementById('weightInput').value = '';
        }

        async function analyzeAndPlan() {
            const userInput = document.getElementById('userMeals').value.trim();
            if (!userInput) {
                alert('请先输入本周想吃的菜');
                return;
            }
            
            if (!CONFIG.geminiApiKey) {
                alert('Gemini API未配置');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'AI分析中...';
            
            document.getElementById('shoppingResult').classList.remove('hidden');
            document.getElementById('aiSuggestions').innerHTML = '<p class="text-sm">AI分析中...</p>';
            document.getElementById('shoppingList').innerHTML = '<p class="text-sm">生成中...</p>';
            
            try {
                const prompt = `你是营养师AI助手。用户计划本周吃以下食物：
${userInput}

用户饮食习惯：
- 周一到周五早餐固定：30g蛋白粉+300ml全脂牛奶+1 shot咖啡+5g肌酸（~39g蛋白质，15g碳水，12g脂肪，320kcal）
- 偏向一天两餐：中午高蛋白，晚上高碳水
- 每日营养目标：蛋白质131g，碳水150g，脂肪42g
- 热量周期：周一到周五每天500kcal缺口（目标1500kcal），周六周日各250kcal盈余（目标1750kcal）
- 蔬菜偏好：不吃青椒，喜欢生吃生菜、胡萝卜，或袋装混合沙拉

可用蛋白质：鸡胸肉, 三文鱼, 虾, 鸡蛋, Ribeye牛排, NY Strip牛排, Bellwether Farms A2有机酸奶, Costco烤鸡（少用）
可用碳水：糙米, 快熟燕麦, 地瓜, 白米饭
可用蔬菜：生菜, 胡萝卜, 袋装混合沙拉, 西兰花, 菠菜, 芦笋（避免青椒）

采购渠道偏好：
- Costco: 鸡胸肉, 三文鱼, 虾, 鸡蛋, 牛排, Costco烤鸡, Costco A2 whole milk, 酸奶, 胡萝卜, 洋葱, 土豆, 糙米, 白米
- TJ: 地瓜, 袋装沙拉
- 中超: 绿叶蔬菜（白菜/油麦菜）, 茄子

重量标注规则：
- 糙米、白米：用熟重标注（例如：400g白米饭熟重）
- 燕麦：用生重标注，配料分开计算（例如：50g燕麦生重 + 300ml牛奶）
- 肉类、地瓜：用生重标注

要求：
1. 标注食物重量时注明生重/熟重（例如：180g鸡胸肉生重，150g地瓜生重）
2. 分析营养缺口（早餐已有39g蛋白质、15g碳水、12g脂肪、320kcal，周一到周五还需1180kcal，周六周日还需1430kcal）
3. 推荐周一至周日具体膳食计划，遵循中午高蛋白/晚上高碳水原则，确保周一到周五每天~1500kcal，周六周日每天~1750kcal
4. 采购清单按Costco、TJ、中超分类

返回格式示例（JSON）：
{
  "suggestions": "<h3>营养分析与膳食建议</h3><h4>1. 营养缺口分析</h4><p>早餐：39g蛋白质、15g碳水、12g脂肪、320kcal<br>周一到周五剩余需求：蛋白质92g、碳水135g、脂肪30g、1180kcal<br>周六周日剩余需求：蛋白质92g、碳水175g、脂肪40g、1430kcal</p><h4>2. 本周膳食推荐</h4><p><span style='background:#fef3c7;padding:2px 8px;font-weight:bold'>周一</span><br>早餐：固定不变（320kcal）<br>午餐（高蛋白）：180g烤鸡胸肉（生重），1杯西兰花，80g糙米饭（熟重）<br>晚餐（高碳水）：150g鳕鱼（生重），400g白米饭（熟重），蒜蓉炒菠菜<br>估算：蛋白质~123g，碳水~143g，脂肪~37g，总热量~1480kcal</p><p><span style='background:#fef3c7;padding:2px 8px;font-weight:bold'>周二</span><br>早餐：固定不变（320kcal）<br>午餐（高蛋白）：...<br>晚餐（高碳水）：...<br>估算：...</p>...<p><span style='background:#fef3c7;padding:2px 8px;font-weight:bold'>周日</span><br>...(继续)</p>",
  "shoppingList": "<h4>3. 采购清单</h4><p><strong>Costco:</strong><br>鸡胸肉2lb（生重），三文鱼1lb（生重），虾1lb，鸡蛋1打，ribeye牛排1.5lb（生重），烤鸡1只，A2牛奶1加仑，酸奶2盒，胡萝卜1袋，西兰花1包</p><p><strong>TJ:</strong><br>地瓜2lb（生重），袋装沙拉3袋</p><p><strong>中超:</strong><br>绿叶蔬菜3把，白米1kg，糙米1kg</p>"
}

注意：
1. 每个周X标题用 <span style='background:#fef3c7;padding:2px 8px;font-weight:bold'>周X</span> 格式（黄色背景高亮）
2. suggestions和shoppingList必须分开，不要把采购清单放在suggestions里`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${CONFIG.geminiApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: prompt}]}]
                    })
                });
                
                const data = await res.json();
                console.log('Gemini response:', data);
                
                // Check for API errors
                if (data.error) {
                    throw new Error(`Gemini API错误: ${data.error.message || JSON.stringify(data.error)}`);
                }
                
                if (!data.candidates || !data.candidates[0]) {
                    console.error('Complete response:', JSON.stringify(data, null, 2));
                    throw new Error('API返回格式错误 - 可能是内容被过滤或rate limit');
                }
                
                const text = data.candidates[0].content.parts[0].text;
                console.log('Response text:', text);
                
                // Remove markdown code blocks if present
                const cleanText = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const jsonMatch = cleanText.match(/\{[\s\S]*"suggestions"[\s\S]*\}/);
                if (!jsonMatch) {
                    // Fallback: display raw response
                    document.getElementById('aiSuggestions').innerHTML = `<p class="text-sm">${text.replace(/\n/g, '<br>')}</p>`;
                    document.getElementById('shoppingList').innerHTML = '<p class="text-sm text-gray-500">采购清单已包含在上方建议中</p>';
                    return;
                }
                
                const result = JSON.parse(jsonMatch[0]);
                
                // Ensure shoppingList is a string
                const shoppingListHtml = typeof result.shoppingList === 'string' 
                    ? result.shoppingList 
                    : '<p class="text-sm text-gray-500">采购清单已包含在建议中</p>';
                
                document.getElementById('aiSuggestions').innerHTML = result.suggestions;
                document.getElementById('shoppingList').innerHTML = shoppingListHtml;
                
                // Save weekly plan to localStorage
                const planMatch = text.match(/周[一二三四五六日][^\n]*：[^\n]+/g);
                if (planMatch) {
                    const plan = {};
                    planMatch.forEach(line => {
                        const [day, meal] = line.split(/[：:]/);
                        const dayName = day.match(/周[一二三四五六日]/)[0];
                        if (!plan[dayName]) plan[dayName] = {};
                        if (line.includes('中午')) plan[dayName].中午 = meal.trim();
                        if (line.includes('晚餐')) plan[dayName].晚餐 = meal.trim();
                    });
                    CONFIG.weeklyPlan = plan;
                    localStorage.setItem('weeklyPlan', JSON.stringify(plan));
                    showTodayPlan();
                }
            } catch (e) {
                console.error('Gemini API error:', e);
                document.getElementById('aiSuggestions').innerHTML = `<p class="text-sm text-red-600">AI分析失败：${e.message}</p>`;
                document.getElementById('shoppingList').innerHTML = '';
            } finally {
                const btn = document.querySelector('button[onclick="analyzeAndPlan()"]');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'AI分析 + 生成清单';
                }
            }
        }

        function switchTab(tab) {
            ['home', 'shopping', 'recipe'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('border-blue-500', 'text-blue-500');
                document.getElementById('tab-' + t).classList.add('text-gray-600');
            });
            
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('border-blue-500', 'text-blue-500');
            document.getElementById('tab-' + tab).classList.remove('text-gray-600');
        }

        // Init
        loadConfig();
        loadWeeklyPlan();
    </script>
</body>
</html>
